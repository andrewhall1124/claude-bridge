<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- No `viewport-fit=cover`: we deliberately let iOS inset the web view to the
         safe area and paint the notch / home-indicator strips itself (with
         `theme-color`), instead of going full-bleed and owning those pixels. That
         avoids the fragile safe-area height math that stranded a gap below the
         footer. With no `cover`, every `env(safe-area-inset-*)` resolves to 0. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Bridge</title>
    <meta name="description" content="Drive Claude Code on a VPS." />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Match the header/footer chrome (--bg-1), not the body, so the iOS-painted
         notch and home-indicator strips blend into the top bar and bottom tabs. -->
    <meta name="theme-color" content="#121212" />
    <meta name="color-scheme" content="dark" />

    <!-- iOS PWA via the web manifest only (display: standalone), like forma. We
         deliberately do NOT set `apple-mobile-web-app-capable` / `mobile-web-app-capable`:
         that legacy "apple standalone" mode ignores `theme-color` and tints the status
         bar from `apple-mobile-web-app-status-bar-style` (black by default) — which is
         what kept the notch black. Manifest-only standalone lets iOS tint the notch and
         home-indicator strips from `theme-color` (#121212), matching the header/footer. -->
    <meta name="apple-mobile-web-app-title" content="Bridge" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
